<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="中华纸艺工坊 - 传承千年纸艺文化，探索剪纸与折纸的东方美学。">
    <meta property="og:title" content="中华纸艺 - 传承千年纸艺文化">
    <meta property="og:description" content="探索剪纸的镂空之韵与折纸的立体之美，一纸成艺，匠心独运。">
    <meta property="og:type" content="website">
    <meta property="og:image" content="../assets/images/figma/home-hero-papercut.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <title>中华纸艺 - 作品展示</title>
    <link rel="preload" href="../assets/fonts/ZCOOLXiaoWei-Regular.ttf" as="font" type="font/ttf">
    <link rel="stylesheet" href="../assets/styles/common.css">
    <link rel="stylesheet" href="../assets/styles/modules/lead-mark.css">
    <link rel="stylesheet" href="../assets/styles/modules/surface-panels.css">
    <link rel="stylesheet" href="../assets/styles/modules/content-cards.css">
    <link rel="stylesheet" href="../assets/styles/pages/gallery.css">
    <link rel="icon" href="../assets/favicon-16.svg" type="image/svg+xml">
</head>
<body data-page="gallery">
    <site-navbar active="gallery"></site-navbar>
    <main class="page-main">
        <section class="page-hero gallery-hero">
            <div class="container">
                <div class="lead-mark">
                    <span class="lead-mark__icon"><img loading="lazy" src="../assets/images/figma/icon-modern.svg" alt=""></span>
                    <div>
                        <h1 class="lead-mark__title">作品展示</h1>
                        <div class="section-rule section-rule--left"></div>
                    </div>
                </div>
                <p class="gallery-hero__text">欣赏精选的剪纸与折纸作品，<br>感受传统纸艺的魅力与创意。</p>
            </div>
        </section>

        <section class="section section--surface">
            <div class="container">
                <div class="gallery-toolbar">
                    <div class="gallery-filter">
                        <span class="gallery-filter__label">筛选：</span>
                        <span class="gallery-chip is-active">全部</span>
                        <span class="gallery-chip">剪纸</span>
                        <span class="gallery-chip">折纸</span>
                    </div>
                    <p class="gallery-toolbar__count">共 6 件作品</p>
                </div>
                <div class="gallery-grid">
                    <article class="gallery-card surface-panel">
                        <div class="gallery-card__image image-panel">
                            <img loading="lazy" src="../assets/images/figma/work-spring-window.jpg" alt="春节窗花">
                        </div>
                        <div class="gallery-card__body">
                            <div class="gallery-card__category">剪纸</div>
                            <h2 class="gallery-card__title">春节窗花</h2>
                            <p class="gallery-card__text">传统春节窗花，寓意吉祥如意</p>
                        </div>
                    </article>
                    <article class="gallery-card surface-panel">
                        <div class="gallery-card__image image-panel">
                            <img loading="lazy" src="../assets/images/figma/culture-craftsman.jpg" alt="传统剪纸">
                        </div>
                        <div class="gallery-card__body">
                            <div class="gallery-card__category">剪纸</div>
                            <h2 class="gallery-card__title">传统剪纸</h2>
                            <p class="gallery-card__text">传统剪纸艺术创作过程</p>
                        </div>
                    </article>
                    <article class="gallery-card surface-panel">
                        <div class="gallery-card__image image-panel">
                            <img loading="lazy" src="../assets/images/figma/art-origami.jpg" alt="折纸艺术局部">
                        </div>
                        <div class="gallery-card__body">
                            <div class="gallery-card__category">折纸</div>
                            <h2 class="gallery-card__title">折面构成</h2>
                            <p class="gallery-card__text">经典折纸造型，象征和平与祝福</p>
                        </div>
                    </article>
                    <article class="gallery-card surface-panel">
                        <div class="gallery-card__image image-panel">
                            <img loading="lazy" src="../assets/images/figma/work-flower.jpg" alt="立体花卉">
                        </div>
                        <div class="gallery-card__body">
                            <div class="gallery-card__category">折纸</div>
                            <h2 class="gallery-card__title">立体花卉</h2>
                            <p class="gallery-card__text">精致的立体折纸花卉作品</p>
                        </div>
                    </article>
                    <article class="gallery-card surface-panel">
                        <div class="gallery-card__image image-panel">
                            <img loading="lazy" src="../assets/images/figma/art-papercut.jpg" alt="多彩折纸">
                        </div>
                        <div class="gallery-card__body">
                            <div class="gallery-card__category">折纸</div>
                            <h2 class="gallery-card__title">多彩折纸</h2>
                            <p class="gallery-card__text">色彩丰富的折纸花朵组合</p>
                        </div>
                    </article>
                    <article class="gallery-card surface-panel">
                        <div class="gallery-card__image image-panel">
                            <img loading="lazy" src="../assets/images/figma/home-hero-papercut.jpg" alt="红色剪纸">
                        </div>
                        <div class="gallery-card__body">
                            <div class="gallery-card__category">剪纸</div>
                            <h2 class="gallery-card__title">红色剪纸</h2>
                            <p class="gallery-card__text">传统红色剪纸装饰</p>
                        </div>
                    </article>
                </div>
            </div>
        </section>

        <section class="section section--paper cta-center gallery-cta">
            <div class="container container--compact">
                <h2 class="section-title">发现更多纸艺之美</h2>
                <p class="cta-center__summary">每一件作品都承载着创作者的心血与巧思<br>探索传统纸艺的无限可能</p>
            </div>
        </section>
    </main>
    <site-footer></site-footer>
    <script type="module" src="../assets/js/components/site-shell.js"></script>
</body>
</html>
