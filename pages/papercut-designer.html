<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="在线剪纸设计器 - 模拟传统剪纸工艺，折叠、绘制、展开，创造属于你的窗花作品。">
    <meta property="og:title" content="中华纸艺 - 剪纸设计器">
    <meta property="og:description" content="在线体验剪纸艺术。选择折叠方式，自由绘制图案，一键展开欣赏对称之美。">
    <meta property="og:type" content="website">
    <title>中华纸艺 - 剪纸设计器</title>
    <link rel="preload" href="../assets/fonts/ZCOOLXiaoWei-Regular.woff2" as="font" type="font/woff2">
    <link rel="stylesheet" href="../assets/styles/common.css">
    <link rel="stylesheet" href="../assets/styles/pages/papercut-designer.css">
    <link rel="icon" href="../assets/favicon-16.svg" type="image/svg+xml">
</head>
<body data-page="designer">
    <a class="skip-to-content" href="#main-content">跳到主要内容</a>
    <site-navbar active="designer"></site-navbar>
    <main class="page-main" id="main-content">

        <section class="designer-stage">
            <div class="canvas-paper">
                <canvas id="papercut-canvas" width="560" height="560"></canvas>
            </div>
            <p class="canvas-hint" id="canvas-hint">在扇形区域内自由绘制，画出你想剪的图案</p>
        </section>

        <div class="designer-controls">
            <div class="controls-row">
                <div class="control-group">
                    <span class="control-label">折叠</span>
                    <div class="fold-options" id="fold-options">
                        <button class="fold-btn" data-fold="2">对折</button>
                        <button class="fold-btn is-active" data-fold="4">四折</button>
                        <button class="fold-btn" data-fold="6">六折</button>
                        <button class="fold-btn" data-fold="8">八折</button>
                    </div>
                </div>

                <div class="control-divider"></div>

                <div class="control-group">
                    <span class="control-label">工具</span>
                    <div class="tool-row" id="tool-options">
                        <button class="tool-btn is-active" data-tool="pen">画笔</button>
                        <button class="tool-btn" data-tool="eraser">橡皮</button>
                    </div>
                </div>

                <div class="control-divider"></div>

                <div class="control-group">
                    <span class="control-label">线宽</span>
                    <input type="range" id="stroke-width" min="1" max="8" value="3">
                    <span class="stroke-val" id="stroke-width-val">3</span>
                </div>

                <div class="control-divider"></div>

                <div class="control-group">
                    <button class="action-btn" id="btn-undo">撤销</button>
                    <button class="action-btn" id="btn-clear">清空</button>
                </div>
            </div>

            <div class="controls-row">
                <div class="control-group">
                    <span class="control-label">纸色</span>
                    <div class="color-options" id="color-options">
                        <button class="color-chip is-active" data-color="#b91c1c"><span style="background:#b91c1c"></span>大红</button>
                        <button class="color-chip" data-color="#cc3e1c"><span style="background:#cc3e1c"></span>朱砂</button>
                        <button class="color-chip" data-color="#d4a017"><span style="background:#d4a017"></span>金箔</button>
                        <button class="color-chip" data-color="#1a6b4a"><span style="background:#1a6b4a"></span>黛青</button>
                        <button class="color-chip" data-color="#2d1f1f"><span style="background:#2d1f1f"></span>墨色</button>
                    </div>
                </div>

                <div class="control-divider"></div>

                <div class="control-group">
                    <span class="control-label">纹样</span>
                    <div class="template-grid" id="template-grid">
                        <button class="template-chip" data-template="moon">月牙纹</button>
                        <button class="template-chip" data-template="sawtooth">锯齿纹</button>
                        <button class="template-chip" data-template="dot">圆点</button>
                        <button class="template-chip" data-template="cloud">云纹</button>
                        <button class="template-chip" data-template="coin">铜钱</button>
                        <button class="template-chip" data-template="plum">梅花</button>
                    </div>
                </div>
            </div>

            <div class="controls-row controls-actions">
                <button class="button button--primary" id="btn-unfold">展开预览</button>
                <button class="button button--secondary" id="btn-export">导出图片</button>
                <button class="button button--secondary" id="btn-share">分享作品</button>
            </div>
        </div>
    </main>

    <div class="unfold-overlay" id="unfold-overlay">
        <canvas id="unfold-canvas"></canvas>
        <button class="unfold-close" id="unfold-close">返回编辑</button>
    </div>

    <script type="module" src="../assets/js/components/site-shell.js"></script>
    <script src="../assets/js/main.js"></script>
    <script src="../assets/js/papercut-designer.js"></script>
</body>
</html>
